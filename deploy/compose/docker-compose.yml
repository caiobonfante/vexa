name: vexa-restore
services:
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    mem_limit: 1g
    ports:
      - "${API_GATEWAY_HOST_PORT:-8056}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - BOT_MANAGER_URL=http://meeting-api:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - MCP_URL=http://mcp:18888
      - REDIS_URL=redis://:${REDIS_PASSWORD:-vexa-redis-dev}@redis:6379/0
      - PUBLIC_BASE_URL=https://share.dev.vexa.ai
      - TRANSCRIPT_SHARE_TTL_SECONDS=900
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:${DASHBOARD_HOST_PORT:-3001},http://localhost:3000,http://localhost:3001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  admin-api:
    build:
      context: ../..
      dockerfile: services/admin-api/Dockerfile
    mem_limit: 512m
    expose:
      - "8001"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN}
      - LOG_LEVEL=DEBUG
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    networks:
      - vexa_default
    restart: unless-stopped

  runtime-api:
    build:
      context: ../..
      dockerfile: packages/runtime-api/Dockerfile
    mem_limit: 512m
    expose:
      - "8090"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-vexa-redis-dev}@redis:6379/0
      - DOCKER_HOST=unix://var/run/docker.sock
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa_default
      - PROFILES_PATH=/app/profiles.yaml
      - LOG_LEVEL=DEBUG
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../packages/meeting-api/config/profiles.yaml:/app/profiles.yaml:ro
    init: true
    depends_on:
      redis:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  meeting-api:
    build:
      context: ../..
      dockerfile: packages/meeting-api/Dockerfile
    mem_limit: 1g
    expose:
      - "8080"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-vexa-redis-dev}@redis:6379/0
      - RUNTIME_API_URL=http://runtime-api:8090
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_IMAGE_NAME=${BOT_IMAGE_NAME:-vexa-bot:dev}
      - TTS_SERVICE_URL=http://tts-service:8002
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa_default
      - LOG_LEVEL=DEBUG
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - ADMIN_TOKEN=${ADMIN_API_TOKEN}
      # Collector (formerly transcription-collector)
      - REDIS_STREAM_NAME=transcription_segments
      - REDIS_CONSUMER_GROUP=collector_group
      - REDIS_STREAM_READ_COUNT=10
      - REDIS_STREAM_BLOCK_MS=2000
      - BACKGROUND_TASK_INTERVAL=10
      - IMMUTABILITY_THRESHOLD=30
      - REDIS_SEGMENT_TTL=3600
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
      # Storage (recordings)
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-recordings}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_SECURE=${S3_SECURE:-true}
      - LOCAL_STORAGE_DIR=${LOCAL_STORAGE_DIR:-/data/recordings}
      - LOCAL_STORAGE_FSYNC=${LOCAL_STORAGE_FSYNC:-true}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-true}
      - CAPTURE_MODES=${CAPTURE_MODES:-audio}
      # Deferred transcription
      - TRANSCRIPTION_GATEWAY_URL=${TRANSCRIPTION_GATEWAY_URL:-}
      # Post-meeting hooks
      - POST_MEETING_HOOKS=${POST_MEETING_HOOKS:-}
      # Voice agent / TTS
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ${LOCAL_STORAGE_VOLUME_SOURCE:-recordings-data}:/data/recordings
    init: true
    depends_on:
      redis:
        condition: service_started
      runtime-api:
        condition: service_started
      tts-service:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  mcp:
    build:
      context: ../..
      dockerfile: services/mcp/Dockerfile
    mem_limit: 512m
    ports:
      - "${MCP_HOST_PORT:-18888}:18888"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - LOG_LEVEL=DEBUG
    init: true
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  dashboard:
    build:
      context: ${DASHBOARD_PATH:?Set DASHBOARD_PATH in .env}/..
      dockerfile: dashboard/Dockerfile
    mem_limit: 1g
    ports:
      - "${DASHBOARD_HOST_PORT:-3001}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-http://localhost:${API_GATEWAY_HOST_PORT:-8056}}
      - NEXT_PUBLIC_VEXA_WS_URL=${NEXT_PUBLIC_VEXA_WS_URL:-ws://localhost:${API_GATEWAY_HOST_PORT:-8056}/ws}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:${DASHBOARD_HOST_PORT:-3001}}
    init: true
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  tts-service:
    build:
      context: ../..
      dockerfile: services/tts-service/Dockerfile
    mem_limit: 1g
    expose:
      - "8002"
    environment:
      - TTS_API_TOKEN=${TTS_API_TOKEN:-}
      - LOG_LEVEL=DEBUG
    volumes:
      - tts-voices:/app/voices
    init: true
    networks:
      - vexa_default
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    mem_limit: 512m
    command:
      ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec",
       "--requirepass", "${REDIS_PASSWORD:-vexa-redis-dev}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vexa-redis-dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - vexa_default
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    networks:
      - vexa_default
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa-recordings}
        cat > /tmp/cors.xml <<'XML'
        <CORSConfiguration>
          <CORSRule>
            <AllowedOrigin>*</AllowedOrigin>
            <AllowedMethod>GET</AllowedMethod>
            <AllowedMethod>HEAD</AllowedMethod>
            <AllowedHeader>*</AllowedHeader>
          </CORSRule>
        </CORSConfiguration>
        XML
        mc cors set vexa/${MINIO_BUCKET:-vexa-recordings} /tmp/cors.xml || echo "minio cors set unsupported in this environment; continuing"
        mc anonymous set download vexa/${MINIO_BUCKET:-vexa-recordings} || true
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa_default

volumes:
  redis-data:
  postgres-data:
  minio-data:
  recordings-data:
  tts-voices:

networks:
  vexa_default:
    driver: bridge
