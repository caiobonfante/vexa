# Default values for the vexa chart.
# This chart is designed for LOCAL development builds:
#   - imagePullPolicy defaults to IfNotPresent
#   - images default to DockerHub repos with :latest tag
#   - Override tags with specific YYMMDD-HHMM timestamps for traceability

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  clusterDomain: cluster.local

  # Common pod-level knobs (override per component if you want)
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}

# Shared secrets (recommended: override via --set-file or external secret tooling)
secrets:
  existingSecretName: ""
  adminApiToken: "CHANGE_ME"   # Used by Admin API auth & MeetingToken signing across services
  transcriberApiKey: ""

# Shared database config (used by admin-api, transcription-collector/meeting-api)
database:
  host: ""          # auto-filled if postgres.enabled=true, else REQUIRED
  port: 5432
  name: "vexa"
  user: "vexa"
  sslMode: "disable"

# Shared redis config
redisConfig:
  url: ""           # auto-filled if redis.enabled=true, else REQUIRED
  host: ""
  port: 6379

# ---------- Components ----------

apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/api-gateway
    tag: latest
  mcpUrl: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv: []

adminApi:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/admin-api
    tag: latest
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv: []

meetingApi:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/meeting-api
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv: []

transcriptionCollector:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/transcription-collector
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  config:
    # Defaults from the Transcription Collector docs
    redisStreamName: "transcription_segments"
    redisSpeakerEventsStreamName: "speaker_events_relative"
    redisConsumerGroup: "transcription_collectors"
    backgroundTaskIntervalSeconds: 30
    immutabilityThresholdSeconds: 60
    redisSegmentTtlSeconds: 86400
    redisSpeakerEventTtlSeconds: 86400

  extraEnv: []

transcriptionService:
  enabled: false
  replicaCount: 1
  image:
    repository: vexaai/transcription-service
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  azure:
    endpoint: ""
    apiKey: ""
    apiVersion: "2025-03-01-preview"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  extraEnv: []

mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/mcp
    tag: latest
  service:
    type: ClusterIP
    port: 18888
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv: []

dashboard:
  enabled: false
  replicaCount: 1
  image:
    repository: vexaai/dashboard
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  # env:
  #   ENABLE_AZURE_AD_AUTH: "true"
  #   NEXTAUTH_URL: ""
  env: {}
  extraEnv: []
  extraSecretName: ""
  extraSecretEnv: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    tls: []

migrations:
  enabled: false
  backoffLimit: 3
  image:
    repository: ""
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------- Optional bundled dependencies (for dev) ----------

postgres:
  enabled: true
  image: postgres:15-alpine
  credentialsSecretName: postgres-credentials
  service:
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

redis:
  enabled: true
  image: redis:7-alpine
  service:
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ---------- Ingress (optional; exposes api-gateway by default) ----------
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: "vexa.local"
  tls: []
  paths:
    - path: /
      pathType: Prefix
      service: api-gateway
      servicePort: 8000
