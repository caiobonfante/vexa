# Default values for the Vexa Helm chart.
# This chart is designed for LOCAL development builds:
#   - imagePullPolicy defaults to IfNotPresent
#   - images default to DockerHub repos with :dev tag
#   - Override tags with specific YYMMDD-HHMM timestamps for traceability

global:
  imagePullPolicy: Always
  imagePullSecrets: []
  clusterDomain: cluster.local

  # Common pod-level knobs (override per component if you want)
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}

# Shared secrets (recommended: override via --set-file or external secret tooling)
secrets:
  existingSecretName: ""
  adminApiToken: "CHANGE_ME"   # Used by Admin API auth & MeetingToken signing across services
  transcriberApiKey: ""

# Shared database config (used by admin-api, meeting-api, runtime-api)
database:
  host: ""          # auto-filled if postgres.enabled=true, else REQUIRED
  port: 5432
  name: "vexa"
  user: "postgres"
  password: "postgres"
  sslMode: "disable"

# Shared redis config
redisConfig:
  url: ""           # auto-filled if redis.enabled=true, else REQUIRED
  host: ""
  port: 6379

# ---------- Components ----------

apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/api-gateway
    tag: dev
  mcpUrl: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv: []

adminApi:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/admin-api
    tag: dev
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv: []

meetingApi:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/meeting-api
    tag: dev
  service:
    type: ClusterIP
    port: 8080
  storageBackend: minio
  botImageName: "vexaai/vexa-bot:latest"
  transcriptionServiceUrl: ""
  transcriptionServiceToken: ""
  minioSecure: "false"
  logLevel: "INFO"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv: []

runtimeApi:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/runtime-api
    tag: dev
  service:
    type: ClusterIP
    port: 8090
  profilesPath: "/app/profiles.yaml"
  logLevel: "INFO"
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []

ttsService:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/tts-service
    tag: dev
  service:
    type: ClusterIP
    port: 8002
  apiToken: ""
  logLevel: "INFO"
  persistence:
    size: 5Gi
    storageClassName: ""
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  extraEnv: []

mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/mcp
    tag: dev
  service:
    type: ClusterIP
    port: 18888
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv: []

dashboard:
  enabled: false
  replicaCount: 1
  image:
    repository: vexaai/dashboard
    tag: dev
  service:
    type: ClusterIP
    port: 3000
  # env:
  #   ENABLE_AZURE_AD_AUTH: "true"
  #   NEXTAUTH_URL: ""
  env: {}
  extraEnv: []
  extraSecretName: ""
  extraSecretEnv: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    tls: []

migrations:
  enabled: false
  backoffLimit: 3
  image:
    repository: ""
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------- Optional bundled dependencies (for dev) ----------

postgres:
  enabled: true
  image: postgres:17-alpine
  credentialsSecretName: postgres-credentials
  service:
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

redis:
  enabled: true
  image: redis:7-alpine
  service:
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  accessKey: vexa-access-key
  secretKey: vexa-secret-key
  bucket: vexa
  persistence:
    size: 10Gi
    storageClassName: ""
  service:
    type: ClusterIP
    port: 9000
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# ---------- Ingress (optional; exposes api-gateway by default) ----------
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: "vexa.local"
  tls: []
  paths:
    - path: /
      pathType: Prefix
      service: api-gateway
      servicePort: 8000
