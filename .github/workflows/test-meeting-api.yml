name: Test Meeting API

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'packages/meeting-api/**'
      - 'libs/admin-models/**'
      - '.github/workflows/test-meeting-api.yml'
  pull_request:
    paths:
      - 'packages/meeting-api/**'
      - 'libs/admin-models/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e libs/admin-models/
          pip install -e packages/meeting-api/
          pip install pytest pytest-asyncio httpx
      - name: Run unit tests
        run: pytest packages/meeting-api/tests/ -v --ignore=packages/meeting-api/tests/test_integration_live.py
