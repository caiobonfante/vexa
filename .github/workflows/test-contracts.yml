name: Test Frozen Contracts

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'tests/contracts/**'
      - 'packages/meeting-api/meeting_api/schemas.py'
      - 'packages/meeting-api/meeting_api/models.py'
      - '.github/workflows/test-contracts.yml'
  pull_request:
    paths:
      - 'tests/contracts/**'
      - 'packages/meeting-api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e libs/admin-models/
          pip install -e packages/meeting-api/
          pip install pytest
      - name: Run contract tests
        run: pytest tests/contracts/ -v
