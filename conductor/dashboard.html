<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conductor Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }

  .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .meta { color: var(--muted); font-size: 13px; }
  .refresh-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .totals { display: flex; gap: 32px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .stat { text-align: center; }
  .stat .value { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .layout { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 1fr 1fr; height: calc(100vh - 105px); }
  .sidebar { grid-row: 1 / 3; border-right: 1px solid var(--border); overflow-y: auto; }
  .main-top { border-bottom: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .main-bottom { overflow-y: auto; display: flex; flex-direction: column; }

  .panel-title { padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 1; display: flex; justify-content: space-between; align-items: center; }
  .panel-tabs { display: flex; gap: 0; }
  .panel-tab { padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; background: var(--surface); border-right: 1px solid var(--border); }
  .panel-tab:hover { color: var(--text); }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .mission-card { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .mission-card:hover { background: var(--surface); }
  .mission-card.selected { background: var(--surface); border-left: 3px solid var(--accent); }
  .mission-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .mission-focus { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .mission-stats { display: flex; gap: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .badge-completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-running { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-evaluating { background: rgba(188,140,255,0.15); color: var(--purple); }
  .badge-plateau { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-rejected { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-accepted { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-unknown { background: rgba(139,148,158,0.15); color: var(--muted); }

  .scores-list { padding: 4px 0; }
  .score-row { display: flex; align-items: center; padding: 3px 16px; gap: 8px; }
  .score-name { flex: 0 0 160px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-bar-bg { flex: 1; height: 14px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .score-bar.high { background: var(--green); }
  .score-bar.mid { background: var(--yellow); }
  .score-bar.low { background: var(--red); }
  .score-value { flex: 0 0 28px; text-align: right; font-size: 12px; font-weight: 600; }

  .output-panel { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; padding: 8px 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--muted); flex: 1; overflow-y: auto; }
  .output-panel .line { padding: 1px 0; }
  .output-panel .line.error { color: var(--red); }
  .output-panel .line.success { color: var(--green); }
  .output-panel .line.info { color: var(--accent); }
  .output-panel .line.bash { color: #f0883e; }
  .output-panel .line.read { color: var(--muted); }
  .output-panel .line.edit { color: var(--purple); }
  .output-panel .line.search { color: var(--muted); }
  .output-panel .line.agent { color: var(--accent); font-weight: 600; }
  .output-panel .line.tool { color: var(--yellow); }
  .output-panel .line.header { color: var(--text); font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 4px; }
  .output-panel .line.diff-add { color: var(--green); }
  .output-panel .line.diff-del { color: var(--red); }

  .empty { padding: 40px; text-align: center; color: var(--muted); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    .sidebar { grid-row: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Conductor</h1>
  <div class="meta"><span class="refresh-dot"></span><span id="timestamp">loading...</span></div>
</div>

<div class="totals">
  <div class="stat"><div class="value" id="t-missions">-</div><div class="label">Missions</div></div>
  <div class="stat"><div class="value" id="t-cost">-</div><div class="label">Cost</div></div>
  <div class="stat"><div class="value" id="t-duration">-</div><div class="label">Duration</div></div>
  <div class="stat"><div class="value" id="t-tokens-in">-</div><div class="label">Tokens In</div></div>
  <div class="stat"><div class="value" id="t-tokens-out">-</div><div class="label">Tokens Out</div></div>
</div>

<div class="layout">
  <!-- Sidebar: missions + scores -->
  <div class="sidebar">
    <div class="panel-title">Missions</div>
    <div id="missions"></div>
    <div class="panel-title">Scores</div>
    <div id="scores" class="scores-list"></div>
  </div>

  <!-- Top panel: batch output -->
  <div class="main-top">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="switchTab('batch')" id="tab-batch">Batch Output</div>
      <div class="panel-tab" onclick="switchTab('evaluator')" id="tab-evaluator">Evaluator</div>
      <div class="panel-title" style="flex:1;border-bottom:none;border-right:none;">
        <span id="output-mission">select a mission</span>
      </div>
    </div>
    <div id="batch-output" class="output-panel"><div class="empty">Click a mission to see its output</div></div>
    <div id="evaluator-output" class="output-panel" style="display:none"><div class="empty">No evaluator verdict yet</div></div>
  </div>

  <!-- Bottom panel: conductor log -->
  <div class="main-bottom">
    <div class="panel-title">Conductor Log — <span id="log-mission">select a mission</span></div>
    <div id="logs" class="output-panel"><div class="empty">Click a mission to see its logs</div></div>
  </div>
</div>

<script>
let selectedMission = null;
let data = null;
let activeTab = 'batch';

function fmt(n) { return n == null ? '—' : n.toLocaleString(); }
function fmtCost(n) { return n == null || n === 0 ? '—' : '$' + n.toFixed(2); }
function fmtDur(s) {
  if (s == null || s === 0) return '—';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m > 0 ? m + 'm ' + sec + 's' : sec + 's';
}
function badgeClass(status) {
  const s = (status || '').toLowerCase();
  if (s === 'completed') return 'badge-completed';
  if (s === 'running') return 'badge-running';
  if (s === 'evaluating') return 'badge-evaluating';
  if (s === 'plateau') return 'badge-plateau';
  if (s === 'rejected') return 'badge-rejected';
  if (s === 'accepted') return 'badge-accepted';
  return 'badge-unknown';
}
function scoreColor(s) { return s >= 80 ? 'high' : s >= 50 ? 'mid' : 'low'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function colorLine(line) {
  let cls = '';
  if (/^▶ BASH:|^  → /.test(line)) cls = 'bash';
  else if (/^◀ READ:/.test(line)) cls = 'read';
  else if (/^✎ EDIT:|^✎ WRITE:/.test(line)) cls = 'edit';
  else if (/^🔍 G/.test(line)) cls = 'search';
  else if (/^🤖 AGENT:/.test(line)) cls = 'agent';
  else if (/^⚙/.test(line)) cls = 'tool';
  else if (/^═══/.test(line)) cls = 'header';
  else if (/ACCOMPLISHED|ACCEPTED|PASS|completed/i.test(line)) cls = 'success';
  else if (/REJECTED|FAIL|ERROR|PLATEAU/i.test(line)) cls = 'error';
  else if (/CONDUCTOR:|iteration|spawning|evaluator/i.test(line)) cls = 'info';
  else if (/^  \+/.test(line)) cls = 'diff-add';
  else if (/^  -/.test(line)) cls = 'diff-del';
  return `<div class="line ${cls}">${escHtml(line)}</div>`;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-batch').className = 'panel-tab' + (tab === 'batch' ? ' active' : '');
  document.getElementById('tab-evaluator').className = 'panel-tab' + (tab === 'evaluator' ? ' active' : '');
  document.getElementById('batch-output').style.display = tab === 'batch' ? '' : 'none';
  document.getElementById('evaluator-output').style.display = tab === 'evaluator' ? '' : 'none';
}

function render(d) {
  data = d;
  document.getElementById('timestamp').textContent = d.timestamp;

  let totalTokensIn = 0, totalTokensOut = 0;
  d.missions.forEach(m => { totalTokensIn += m.tokens_in || 0; totalTokensOut += m.tokens_out || 0; });
  document.getElementById('t-missions').textContent = d.totals.count;
  document.getElementById('t-cost').textContent = fmtCost(d.totals.cost);
  document.getElementById('t-duration').textContent = fmtDur(d.totals.duration);
  document.getElementById('t-tokens-in').textContent = fmt(totalTokensIn);
  document.getElementById('t-tokens-out').textContent = fmt(totalTokensOut);

  const mc = document.getElementById('missions');
  mc.innerHTML = d.missions.length === 0
    ? '<div class="empty">No active missions</div>'
    : d.missions.map(m => `
      <div class="mission-card ${selectedMission === m.name ? 'selected' : ''}" onclick="selectMission('${m.name}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="mission-name">${m.name}</div>
          <span class="badge ${badgeClass(m.status)}">${m.status}</span>
        </div>
        <div class="mission-focus">${m.focus}</div>
        <div class="mission-stats">
          <span>iter ${m.iteration}</span>
          <span>${fmtCost(m.cost)}</span>
          <span>${fmtDur(m.duration)}</span>
          ${m.tokens_in ? `<span>${fmt(m.tokens_in)}/${fmt(m.tokens_out)} tok</span>` : ''}
          ${m.evaluator && m.evaluator !== 'no verdict'
            ? `<span class="badge ${m.evaluator === 'ACCEPTED' ? 'badge-accepted' : 'badge-rejected'}">${m.evaluator}</span>`
            : ''}
        </div>
      </div>
    `).join('');

  const sc = document.getElementById('scores');
  const sorted = Object.entries(d.scores || {}).sort((a,b) => b[1] - a[1]);
  sc.innerHTML = sorted.map(([name, score]) => `
    <div class="score-row">
      <div class="score-name" title="${name}">${name}</div>
      <div class="score-bar-bg"><div class="score-bar ${scoreColor(score)}" style="width:${score}%"></div></div>
      <div class="score-value">${score}</div>
    </div>
  `).join('');
}

async function selectMission(name) {
  selectedMission = name;
  document.getElementById('output-mission').textContent = name;
  document.getElementById('log-mission').textContent = name;
  if (data) render(data);
  await Promise.all([loadBatch(name), loadLogs(name), loadEvaluator(name)]);
}

function isNearBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 50;
}

async function loadBatch(name) {
  try {
    const r = await fetch('/api/batch/' + encodeURIComponent(name));
    const text = await r.text();
    const el = document.getElementById('batch-output');
    const wasAtBottom = isNearBottom(el);
    if (!text || text.startsWith('No batch')) {
      el.innerHTML = '<div class="empty">No batch output yet</div>';
    } else {
      el.innerHTML = text.split('\n').map(colorLine).join('');
      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }
  } catch(e) {
    document.getElementById('batch-output').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

async function loadLogs(name) {
  try {
    const r = await fetch('/api/logs/' + encodeURIComponent(name));
    const text = await r.text();
    const el = document.getElementById('logs');
    const wasAtBottom = isNearBottom(el);
    el.innerHTML = text.split('\n').map(colorLine).join('');
    if (wasAtBottom) el.scrollTop = el.scrollHeight;
  } catch(e) {
    document.getElementById('logs').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

async function loadEvaluator(name) {
  try {
    const r = await fetch('/api/evaluator/' + encodeURIComponent(name));
    const text = await r.text();
    const el = document.getElementById('evaluator-output');
    if (!text || text.startsWith('No evaluator')) {
      el.innerHTML = '<div class="empty">No evaluator verdict yet</div>';
    } else {
      const wasAtBottom = isNearBottom(el);
      el.innerHTML = text.split('\n').map(colorLine).join('');
      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }
  } catch(e) {
    document.getElementById('evaluator-output').innerHTML = '<div class="empty">Failed to load</div>';
  }
}

async function refresh() {
  try {
    const r = await fetch('/api/dashboard');
    const d = await r.json();
    render(d);
    if (selectedMission) {
      await Promise.all([loadBatch(selectedMission), loadLogs(selectedMission), loadEvaluator(selectedMission)]);
    }
  } catch(e) { console.error('refresh failed', e); }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
