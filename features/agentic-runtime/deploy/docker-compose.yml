# Agentic Runtime -- Isolated infrastructure
# Reuses transcription-service from shared stack (external URL in .env)
name: vexa-agentic

services:
  redis:
    image: redis:7.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "${REDIS_PORT:-6389}:6379"
    volumes:
      - redis-data:/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa_agentic}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5458}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio-data:/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa-agentic}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa_agentic

  chat-api:
    build:
      context: ../../..
      dockerfile: services/chat-api/Dockerfile
    ports:
      - "${CHAT_API_PORT:-8100}:8100"
    environment:
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - AGENT_IMAGE=vexa-agent:dev
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - REDIS_URL=redis://redis:6379
      - RUNTIME_API_URL=http://runtime-api:8090
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vexa_agentic
    depends_on:
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      runtime-api:
        condition: service_started
    restart: unless-stopped

  telegram-bot:
    build:
      context: ../../..
      dockerfile: services/telegram-bot/Dockerfile
    expose:
      - "8200"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_API_URL=http://chat-api:8100
      - CHAT_DEFAULT_USER_ID=${CHAT_DEFAULT_USER_ID:-}
      - CHAT_USER_MAP=${CHAT_USER_MAP:-{}}
      - TELEGRAM_BOT_PORT=8200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - chat-api
    restart: unless-stopped

  # --- Meeting services (MVP3) ---

  api-gateway:
    build:
      context: ../../..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8066}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - BOT_MANAGER_URL=http://bot-manager:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://transcription-collector:8000
      - MCP_URL=http://mcp:18888
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=http://localhost:3002,http://localhost:3001
    networks:
      - vexa_agentic
    depends_on:
      - admin-api
      - bot-manager
      - transcription-collector
      - redis
    restart: unless-stopped

  admin-api:
    build:
      context: ../../..
      dockerfile: services/admin-api/Dockerfile
    ports:
      - "${ADMIN_API_PORT:-8067}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - postgres
    restart: unless-stopped

  bot-manager:
    build:
      context: ../../..
      dockerfile: services/bot-manager/Dockerfile
    ports:
      - "${BOT_MANAGER_PORT:-8070}:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BOT_IMAGE_NAME=vexa-bot:dev
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - MINIO_SECURE=false
      - RECORDING_ENABLED=true
      - CAPTURE_MODES=audio
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts-service:8002}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vexa_agentic
    depends_on:
      - redis
      - postgres
      - admin-api
    restart: unless-stopped

  transcription-collector:
    build:
      context: ../../..
      dockerfile: services/transcription-collector/Dockerfile
    ports:
      - "${TC_PORT:-8060}:8000"
    volumes:
      - ../../../alembic.ini:/app/alembic.ini
      - ../../../libs/shared-models/alembic:/app/alembic
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - MINIO_SECURE=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # DB migrations (runs once)
  db-migrate:
    build:
      context: ../../..
      dockerfile: services/transcription-collector/Dockerfile
    volumes:
      - ../../../alembic.ini:/app/alembic.ini
      - ../../../libs/shared-models/alembic:/app/alembic
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
    entrypoint: ["alembic", "upgrade", "head"]
    networks:
      - vexa_agentic
    depends_on:
      postgres:
        condition: service_started

  # --- Core services ---

  runtime-api:
    build:
      context: ../../..
      dockerfile: services/runtime-api/Dockerfile
    ports:
      - "${RUNTIME_API_PORT:-8090}:8090"
    environment:
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - AGENT_IMAGE=vexa-agent:dev
      - BROWSER_IMAGE=vexa-bot:dev
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vexa_agentic
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:

networks:
  vexa_agentic:
    driver: bridge
