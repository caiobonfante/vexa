# Agentic Runtime -- Isolated infrastructure
# Reuses transcription-service from shared stack (external URL in .env)
name: vexa-agentic

services:
  redis:
    image: redis:7.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "${REDIS_PORT:-6389}:6379"
    volumes:
      - redis-data:/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa_agentic}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5458}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio-data:/data
    networks:
      - vexa_agentic
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa-agentic}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa_agentic

  agent-api:
    build:
      context: ../../..
      dockerfile: services/agent-api/Dockerfile
    ports:
      - "${CHAT_API_PORT:-8100}:8100"
    environment:
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - AGENT_IMAGE=vexaai/vexa-agent:dev
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - REDIS_URL=redis://redis:6379
      - RUNTIME_API_URL=http://runtime-api:8090
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vexa_agentic
    depends_on:
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      runtime-api:
        condition: service_started
    restart: unless-stopped

  telegram-bot:
    build:
      context: ../../..
      dockerfile: services/telegram-bot/Dockerfile
    expose:
      - "8200"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_API_URL=http://agent-api:8100
      - CHAT_DEFAULT_USER_ID=${CHAT_DEFAULT_USER_ID:-}
      - CHAT_USER_MAP=${CHAT_USER_MAP:-{}}
      - TELEGRAM_BOT_PORT=8200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - agent-api
    restart: unless-stopped

  # --- Meeting services (MVP3) ---

  api-gateway:
    build:
      context: ../../..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8066}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - MEETING_API_URL=http://meeting-api:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - MCP_URL=http://mcp:18888
      - CALENDAR_SERVICE_URL=http://calendar-service:8050
      - AGENT_API_URL=http://agent-api:8100
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=http://localhost:3002,http://localhost:3001
    networks:
      - vexa_agentic
    depends_on:
      - admin-api
      - meeting-api
      - agent-api
      - redis
    restart: unless-stopped

  admin-api:
    build:
      context: ../../..
      dockerfile: services/admin-api/Dockerfile
    ports:
      - "${ADMIN_API_PORT:-8067}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - postgres
    restart: unless-stopped

  meeting-api:
    build:
      context: ../../..
      dockerfile: services/meeting-api/Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
      - RUNTIME_API_URL=http://runtime-api:8090
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_IMAGE_NAME=vexaai/vexa-bot:dev
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts-service:8002}
      - POST_MEETING_HOOKS=http://agent-api:8100/internal/webhooks/meeting-completed
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - MINIO_SECURE=false
      - RECORDING_ENABLED=true
      - CAPTURE_MODES=audio
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - redis
      - postgres
      - runtime-api
    restart: unless-stopped


  # --- Core services ---

  runtime-api:
    build:
      context: ../../../services/runtime-api
      dockerfile: Dockerfile
    group_add:
      - "${DOCKER_GID:-998}"
    ports:
      - "${RUNTIME_API_PORT:-8090}:8090"
    environment:
      - DOCKER_NETWORK=vexa-agentic_vexa_agentic
      - AGENT_IMAGE=vexaai/vexa-agent:dev
      - BROWSER_IMAGE=vexaai/vexa-bot:dev
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-agentic}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - API_KEYS=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - PROFILES_PATH=/app/profiles.yaml
      - ALLOW_PRIVATE_CALLBACKS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../../services/meeting-api/config/profiles.yaml:/app/profiles.yaml:ro
    networks:
      - vexa_agentic
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  calendar-service:
    build:
      context: ../../..
      dockerfile: services/calendar-service/Dockerfile
    ports:
      - "${CALENDAR_SERVICE_PORT:-8050}:8050"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa_agentic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - SYNC_INTERVAL_SECONDS=${CALENDAR_SYNC_INTERVAL:-300}
      - DEFAULT_LEAD_TIME_MINUTES=${CALENDAR_LEAD_TIME:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vexa_agentic
    depends_on:
      - postgres
      - meeting-api
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:

networks:
  vexa_agentic:
    driver: bridge
