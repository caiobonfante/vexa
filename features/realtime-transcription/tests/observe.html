<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RT Transcription Observer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  h1 { font-size: 16px; color: #888; margin-bottom: 12px; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls button { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #e0e0e0; }
  .controls input { width: 280px; }
  .controls button { cursor: pointer; background: #0f3460; }
  .controls button:hover { background: #1a5276; }
  .controls button.active { background: #28a745; border-color: #28a745; }
  .controls button.danger { background: #dc3545; }
  .status { font-size: 12px; color: #666; margin-left: 8px; }
  .status.connected { color: #28a745; }
  .status.error { color: #dc3545; }

  .panels { display: grid; grid-template-columns: 1fr 400px; gap: 16px; height: calc(100vh - 120px); }
  @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } }

  .panel { background: #16213e; border: 1px solid #333; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
  .panel-header { padding: 8px 12px; background: #0f3460; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; }
  .panel-body { overflow-y: auto; padding: 8px 12px; flex: 1; }

  .segment { margin-bottom: 8px; padding: 8px; border-radius: 4px; border-left: 3px solid #444; }
  .segment.draft { border-left-color: #f0ad4e; opacity: 0.7; }
  .segment.confirmed { border-left-color: #28a745; }
  .segment.duplicate { border-left-color: #dc3545; background: rgba(220,53,69,0.1); }
  .segment .meta { font-size: 11px; color: #888; margin-bottom: 4px; }
  .segment .speaker { font-weight: 600; }
  .segment .text { font-size: 13px; line-height: 1.4; }

  .speaker-a { color: #5dade2; }
  .speaker-b { color: #58d68d; }
  .speaker-c { color: #f4d03f; }
  .speaker-d { color: #af7ac5; }
  .speaker-e { color: #ec7063; }
  .speaker-f { color: #f0b27a; }
  .speaker-unknown { color: #aaa; }

  .metric { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; font-size: 13px; }
  .metric .label { color: #888; }
  .metric .value { font-weight: 600; }
  .metric .value.good { color: #28a745; }
  .metric .value.warn { color: #f0ad4e; }
  .metric .value.bad { color: #dc3545; }

  .log { font-size: 11px; color: #666; padding: 2px 0; font-family: monospace; }
  .log.error { color: #dc3545; }
</style>
</head>
<body>

<h1>Realtime Transcription Observer</h1>

<div class="controls">
  <input id="apiKey" placeholder="API Key" value="vxa_user_pZqJ5dEQK47Mc7YeVTR53wAefBCs7Nf6d0fHbHs8">
  <input id="nativeId" placeholder="Native Meeting ID" value="">
  <input id="wsUrl" placeholder="WS URL" value="ws://localhost:8066/ws">
  <button id="connectBtn" onclick="toggleConnect()">Connect</button>
  <button onclick="clearAll()">Clear</button>
  <span id="statusLabel" class="status">Disconnected</span>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <span>Segments</span>
      <span id="segCount">0 segments</span>
    </div>
    <div class="panel-body" id="segmentList"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>Metrics</span>
      <span id="lastUpdate">-</span>
    </div>
    <div class="panel-body" id="metricsPanel">
      <div class="metric"><span class="label">WS messages</span><span class="value" id="m-wsMsgs">0</span></div>
      <div class="metric"><span class="label">Total updates</span><span class="value" id="m-totalUpdates">0</span></div>
      <div class="metric"><span class="label">Confirmed</span><span class="value" id="m-confirmed">0</span></div>
      <div class="metric"><span class="label">Drafts</span><span class="value" id="m-drafts">0</span></div>
      <div class="metric"><span class="label">Duplicates (dedup)</span><span class="value" id="m-dupes">0</span></div>
      <div class="metric"><span class="label">Out of order</span><span class="value" id="m-outOfOrder">0</span></div>
      <hr style="border-color:#333; margin: 8px 0;">
      <div class="metric"><span class="label">Speakers</span><span class="value" id="m-speakers">0</span></div>
      <div class="metric"><span class="label">Avg segment duration</span><span class="value" id="m-avgDur">-</span></div>
      <div class="metric"><span class="label">Max segment duration</span><span class="value" id="m-maxDur">-</span></div>
      <div class="metric"><span class="label">Segments &gt;15s</span><span class="value" id="m-over15">0</span></div>
      <div class="metric"><span class="label">Segments &gt;30s</span><span class="value" id="m-over30">0</span></div>
      <hr style="border-color:#333; margin: 8px 0;">
      <div class="metric"><span class="label">First segment latency</span><span class="value" id="m-firstLatency">-</span></div>
      <div class="metric"><span class="label">Draft→Confirm avg</span><span class="value" id="m-draftToConfirm">-</span></div>
      <hr style="border-color:#333; margin: 8px 0;">
      <div style="font-size:12px; color:#666; margin-top:8px;">Event Log</div>
      <div id="eventLog" style="max-height:300px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<script>
let ws = null;
let connected = false;
let connectTime = null;

// Deduped segment store: keyed by segment_id
const segments = new Map(); // segment_id -> {speaker, text, completed, start, end, firstSeenAt, confirmedAt, updates}
const speakerColors = {};
const colorPool = ['speaker-a','speaker-b','speaker-c','speaker-d','speaker-e','speaker-f'];
let colorIdx = 0;

const metrics = {
  wsMsgs: 0,
  totalUpdates: 0,
  confirmed: 0,
  drafts: 0,
  dupes: 0,
  outOfOrder: 0,
  firstSegmentAt: null,
  draftToConfirmMs: [],
};

function getSpeakerClass(speaker) {
  if (!speakerColors[speaker]) {
    speakerColors[speaker] = colorPool[colorIdx % colorPool.length];
    colorIdx++;
  }
  return speakerColors[speaker];
}

function setStatus(text, cls) {
  const el = document.getElementById('statusLabel');
  el.textContent = text;
  el.className = 'status ' + (cls || '');
}

function addLog(text, isError) {
  const log = document.getElementById('eventLog');
  const div = document.createElement('div');
  div.className = 'log' + (isError ? ' error' : '');
  div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  log.prepend(div);
  // Keep max 100 entries
  while (log.children.length > 100) log.removeChild(log.lastChild);
}

function updateMetrics() {
  document.getElementById('m-wsMsgs').textContent = metrics.wsMsgs;
  document.getElementById('m-totalUpdates').textContent = metrics.totalUpdates;
  document.getElementById('m-confirmed').textContent = metrics.confirmed;
  document.getElementById('m-drafts').textContent = metrics.drafts;

  const dupeEl = document.getElementById('m-dupes');
  dupeEl.textContent = metrics.dupes;
  dupeEl.className = 'value ' + (metrics.dupes > 0 ? 'warn' : 'good');

  const oooEl = document.getElementById('m-outOfOrder');
  oooEl.textContent = metrics.outOfOrder;
  oooEl.className = 'value ' + (metrics.outOfOrder > 0 ? 'bad' : 'good');

  // Speaker count
  const speakers = new Set();
  segments.forEach(s => speakers.add(s.speaker));
  document.getElementById('m-speakers').textContent = speakers.size;

  // Duration stats (confirmed only)
  const confirmedSegs = [...segments.values()].filter(s => s.completed);
  const durs = confirmedSegs.map(s => (s.end || 0) - (s.start || 0)).filter(d => d > 0);
  if (durs.length > 0) {
    const avg = durs.reduce((a,b) => a+b, 0) / durs.length;
    const max = Math.max(...durs);
    document.getElementById('m-avgDur').textContent = avg.toFixed(1) + 's';
    const maxEl = document.getElementById('m-maxDur');
    maxEl.textContent = max.toFixed(1) + 's';
    maxEl.className = 'value ' + (max > 30 ? 'bad' : max > 15 ? 'warn' : 'good');
    document.getElementById('m-over15').textContent = durs.filter(d => d > 15).length;
    document.getElementById('m-over30').textContent = durs.filter(d => d > 30).length;
  }

  // First segment latency
  if (metrics.firstSegmentAt && connectTime) {
    document.getElementById('m-firstLatency').textContent = ((metrics.firstSegmentAt - connectTime) / 1000).toFixed(1) + 's';
  }

  // Draft to confirm
  if (metrics.draftToConfirmMs.length > 0) {
    const avg = metrics.draftToConfirmMs.reduce((a,b) => a+b, 0) / metrics.draftToConfirmMs.length;
    document.getElementById('m-draftToConfirm').textContent = (avg / 1000).toFixed(1) + 's';
  }

  document.getElementById('segCount').textContent = segments.size + ' segments';
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

function renderSegments() {
  const list = document.getElementById('segmentList');
  // Sort by start time
  const sorted = [...segments.values()].sort((a,b) => (a.start || 0) - (b.start || 0));

  // Check ordering
  let prevStart = -1;
  metrics.outOfOrder = 0;
  for (const s of sorted) {
    if ((s.start || 0) < prevStart) metrics.outOfOrder++;
    prevStart = s.start || 0;
  }

  list.innerHTML = '';
  for (const s of sorted) {
    const div = document.createElement('div');
    const dur = ((s.end || 0) - (s.start || 0)).toFixed(1);
    const words = s.text.split(/\s+/).length;
    const cls = s.duplicate ? 'duplicate' : (s.completed ? 'confirmed' : 'draft');
    const spkCls = getSpeakerClass(s.speaker);
    div.className = `segment ${cls}`;
    div.innerHTML = `
      <div class="meta">
        <span class="${spkCls} speaker">${s.speaker}</span>
        &nbsp;${(s.start||0).toFixed(1)}s–${(s.end||0).toFixed(1)}s (${dur}s, ${words}w)
        &nbsp;${s.completed ? '✓' : '⋯'}
        ${s.updates > 1 ? `<span style="color:#f0ad4e"> ×${s.updates}</span>` : ''}
        ${s.duplicate ? '<span style="color:#dc3545"> DUP</span>' : ''}
      </div>
      <div class="text">${escHtml(s.text)}</div>
    `;
    list.appendChild(div);
  }
  // Auto-scroll to bottom
  list.scrollTop = list.scrollHeight;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function processMessage(data) {
  metrics.wsMsgs++;
  const type = data.type;

  if (type === 'subscribed') {
    addLog('Subscribed to meeting');
    return;
  }
  if (type === 'pong') return;
  if (type === 'error') {
    addLog('Error: ' + JSON.stringify(data), true);
    return;
  }

  if (type === 'transcript.mutable') {
    const segs = (data.payload && data.payload.segments) || [];
    for (const s of segs) {
      metrics.totalUpdates++;
      const id = s.segment_id || `${s.speaker}-${s.start}`;
      const existing = segments.get(id);

      if (existing) {
        // Update existing
        if (existing.text === s.text && existing.completed === (s.completed || false)) {
          metrics.dupes++;
          existing.duplicate = true;
          existing.updates++;
        } else {
          existing.text = s.text || existing.text;
          existing.speaker = s.speaker || existing.speaker;
          existing.start = s.start ?? existing.start;
          existing.end = s.end_time ?? s.end ?? existing.end;
          existing.updates++;
          existing.duplicate = false;

          if (s.completed && !existing.completed) {
            existing.completed = true;
            existing.confirmedAt = Date.now();
            metrics.confirmed++;
            if (existing.firstSeenAt) {
              metrics.draftToConfirmMs.push(existing.confirmedAt - existing.firstSeenAt);
            }
            addLog(`CONFIRMED ${s.speaker}: "${(s.text||'').substring(0,50)}"`);
          }
        }
      } else {
        // New segment
        const now = Date.now();
        if (!metrics.firstSegmentAt) metrics.firstSegmentAt = now;

        const completed = s.completed || false;
        segments.set(id, {
          id,
          speaker: s.speaker || '?',
          text: s.text || '',
          start: s.start,
          end: s.end_time ?? s.end,
          completed,
          firstSeenAt: now,
          confirmedAt: completed ? now : null,
          updates: 1,
          duplicate: false,
        });

        if (completed) {
          metrics.confirmed++;
          addLog(`CONFIRMED ${s.speaker}: "${(s.text||'').substring(0,50)}"`);
        } else {
          metrics.drafts++;
        }
      }
    }
    renderSegments();
    updateMetrics();
  }
}

function toggleConnect() {
  if (connected) {
    if (ws) ws.close();
    return;
  }

  const apiKey = document.getElementById('apiKey').value;
  const nativeId = document.getElementById('nativeId').value;
  const wsUrl = document.getElementById('wsUrl').value;

  if (!apiKey || !nativeId) {
    setStatus('Need API key and meeting ID', 'error');
    return;
  }

  setStatus('Connecting...', '');
  connectTime = Date.now();

  try {
    ws = new WebSocket(wsUrl);
  } catch(e) {
    setStatus('Connection failed: ' + e.message, 'error');
    return;
  }

  ws.onopen = () => {
    connected = true;
    document.getElementById('connectBtn').textContent = 'Disconnect';
    document.getElementById('connectBtn').className = 'danger';
    setStatus('Connected', 'connected');
    addLog('WebSocket connected');

    // Send API key as first message (some WS servers expect this)
    // Then subscribe
    ws.send(JSON.stringify({
      action: 'subscribe',
      meetings: [{platform: 'teams', native_id: nativeId}],
      api_key: apiKey
    }));

    // Keepalive
    setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({action:'ping'})); }, 25000);
  };

  ws.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      processMessage(data);
    } catch(e) {
      addLog('Parse error: ' + e.message, true);
    }
  };

  ws.onclose = () => {
    connected = false;
    document.getElementById('connectBtn').textContent = 'Connect';
    document.getElementById('connectBtn').className = '';
    setStatus('Disconnected', '');
    addLog('WebSocket disconnected');
    ws = null;
  };

  ws.onerror = (e) => {
    setStatus('Error', 'error');
    addLog('WebSocket error', true);
  };
}

function clearAll() {
  segments.clear();
  Object.keys(metrics).forEach(k => {
    if (Array.isArray(metrics[k])) metrics[k] = [];
    else if (typeof metrics[k] === 'number') metrics[k] = 0;
    else metrics[k] = null;
  });
  renderSegments();
  updateMetrics();
  document.getElementById('eventLog').innerHTML = '';
}

// Auto-fill native_id from URL params
const params = new URLSearchParams(window.location.search);
if (params.get('meeting')) document.getElementById('nativeId').value = params.get('meeting');
if (params.get('key')) document.getElementById('apiKey').value = params.get('key');
if (params.get('ws')) document.getElementById('wsUrl').value = params.get('ws');
// Auto-connect if all params present
if (params.get('meeting') && params.get('auto')) setTimeout(toggleConnect, 500);
</script>
</body>
</html>
