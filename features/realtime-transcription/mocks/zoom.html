<!DOCTYPE html>
<html>
<head>
  <title>Mock Zoom Meeting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }

    /* Pre-join screen */
    #pre-join { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    #pre-join h2 { margin-bottom: 16px; }
    #input-for-name { padding: 10px 16px; font-size: 16px; border-radius: 8px; border: 1px solid #555; background: #2a2a3e; color: #fff; width: 260px; }
    .preview-join-button { padding: 10px 32px; font-size: 16px; border-radius: 20px; border: none; background: #0E72ED; color: #fff; cursor: pointer; }
    .preview-join-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-controls { display: flex; gap: 12px; margin-top: 8px; }
    .preview-controls button { padding: 8px 16px; border-radius: 20px; border: 1px solid #555; background: #2a2a3e; color: #fff; cursor: pointer; }
    .permission-dialog { background: #333; padding: 16px 24px; border-radius: 12px; text-align: center; }
    .permission-dialog button { padding: 8px 20px; border-radius: 8px; border: none; background: #0E72ED; color: #fff; cursor: pointer; margin-top: 8px; }

    /* Meeting view */
    .meeting-app { display: none; height: 100vh; flex-direction: column; }
    .meeting-app.active { display: flex; }

    /* Status bar */
    .status-bar { background: #0d0d1a; padding: 8px 16px; font-size: 13px; display: flex; gap: 24px; }
    .status-bar span { opacity: 0.7; }
    .status-bar .active-label { color: #4ade80; opacity: 1; }

    /* Main content area */
    .meeting-content { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow: hidden; }

    /* Active speaker (large) */
    .speaker-active-container__video-frame {
      flex: 1; background: #16213e; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      position: relative; border: 2px solid #0E72ED; min-height: 200px;
    }
    .speaker-active-container__video-frame .video-avatar__avatar {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .speaker-active-container__video-frame .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%; background: #0E72ED; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold;
    }
    .speaker-active-container__video-frame .video-avatar__avatar-footer span { font-size: 18px; font-weight: 500; }

    /* Speaker bar (thumbnails) */
    .speaker-bar-container { display: flex; gap: 8px; height: 120px; }
    .speaker-bar-container__video-frame {
      flex: 1; background: #16213e; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      position: relative; border: 1px solid #333; transition: border-color 0.3s;
    }
    .speaker-bar-container__video-frame.speaking { border-color: #4ade80; }
    .speaker-bar-container__video-frame .video-avatar__avatar {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .speaker-bar-container__video-frame .avatar-circle {
      width: 40px; height: 40px; border-radius: 50%; background: #555; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold;
    }
    .speaker-bar-container__video-frame .video-avatar__avatar-footer span { font-size: 13px; }

    /* Footer */
    .meeting-footer { background: #1a1a2e; border-top: 1px solid #333; padding: 10px 24px; display: flex; justify-content: center; gap: 16px; }
    .footer-button-base__button { padding: 8px 20px; border-radius: 20px; border: 1px solid #555; background: #2a2a3e; color: #fff; cursor: pointer; font-size: 13px; }
    .footer-button-base__button[aria-label="Leave"] { background: #e53935; border-color: #e53935; }
    .join-audio-container__btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #555; background: #2a2a3e; color: #fff; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

  <!-- ========== PRE-JOIN SCREEN ========== -->
  <div id="pre-join">
    <h2>Join Meeting</h2>
    <div class="permission-dialog" id="permission-dialog">
      <p>Zoom needs access to your microphone and camera</p>
      <button onclick="dismissPermission()">Continue without microphone and camera</button>
    </div>
    <input type="text" id="input-for-name" placeholder="Your Name" oninput="updateJoinButton()">
    <button class="preview-join-button" disabled onclick="joinMeeting()">Join</button>
    <div class="preview-controls">
      <button id="preview-audio-control-button" aria-label="Mute">Mute</button>
      <button id="preview-video-control-button" aria-label="Stop Video">Stop Video</button>
    </div>
  </div>

  <!-- ========== IN-MEETING VIEW ========== -->
  <div class="meeting-app" id="meeting-app">
    <!-- Status bar -->
    <div class="status-bar">
      <span>Mock Zoom Meeting</span>
      <span class="active-label" id="status-speaker">Active: Alice</span>
      <span id="status-audio">Audio: 3 streams active</span>
      <span id="status-cycle">Auto-cycle: ON (8s)</span>
    </div>

    <!-- Main content -->
    <div class="meeting-content">
      <!-- Active speaker (large frame) -->
      <div class="speaker-active-container__video-frame" id="active-speaker">
        <div class="video-avatar__avatar">
          <div class="avatar-circle" id="active-avatar-circle">A</div>
          <div class="video-avatar__avatar-footer">
            <span id="active-speaker-name">Alice</span>
          </div>
        </div>
      </div>

      <!-- Speaker bar (thumbnails) -->
      <div class="speaker-bar-container" id="speaker-bar">
        <div class="speaker-bar-container__video-frame" id="thumb-0">
          <div class="video-avatar__avatar">
            <div class="avatar-circle">A</div>
            <div class="video-avatar__avatar-footer"><span>Alice</span></div>
          </div>
        </div>
        <div class="speaker-bar-container__video-frame" id="thumb-1">
          <div class="video-avatar__avatar">
            <div class="avatar-circle">B</div>
            <div class="video-avatar__avatar-footer"><span>Bob</span></div>
          </div>
        </div>
        <div class="speaker-bar-container__video-frame" id="thumb-2">
          <div class="video-avatar__avatar">
            <div class="avatar-circle">C</div>
            <div class="video-avatar__avatar-footer"><span>Charlie</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Audio elements (separate from tiles, matching real Zoom layout) -->
    <audio id="audio-0" autoplay></audio>
    <audio id="audio-1" autoplay></audio>
    <audio id="audio-2" autoplay></audio>

    <!-- Footer -->
    <div class="meeting-footer">
      <button class="join-audio-container__btn footer-button-base__button">Audio</button>
      <button class="footer-button-base__button send-video-container__btn">Video</button>
      <button aria-label="Leave" class="footer-button-base__button ax-outline footer-button__button">Leave</button>
    </div>
  </div>

  <script>
    // ========== PRE-JOIN LOGIC ==========
    function dismissPermission() {
      document.getElementById('permission-dialog').style.display = 'none';
    }

    function updateJoinButton() {
      var btn = document.querySelector('.preview-join-button');
      btn.disabled = !document.getElementById('input-for-name').value.trim();
    }

    function joinMeeting() {
      document.getElementById('pre-join').style.display = 'none';
      document.getElementById('meeting-app').classList.add('active');
      initAudio();
      startAutoCycle();
    }

    // ========== AUDIO SETUP ==========
    var PARTICIPANTS = ['Alice', 'Bob', 'Charlie'];
    var FREQUENCIES = [440, 550, 660];
    var audioContexts = [];
    var audioElements = null;
    var autoCycleTimer = null;
    var currentActiveSpeakerIndex = 0;

    // Prevent GC — stores refs globally
    window.__vexaAudioStreams = [];

    function initAudio() {
      audioElements = document.querySelectorAll('audio');

      PARTICIPANTS.forEach(function(name, i) {
        var ctx = new AudioContext({ sampleRate: 48000 });
        var osc = ctx.createOscillator();
        osc.frequency.value = FREQUENCIES[i];
        osc.type = 'sine';

        var gain = ctx.createGain();
        gain.gain.value = 0.3; // All audible by default (amplitude > 0.005)

        var dest = ctx.createMediaStreamDestination();
        osc.connect(gain);
        gain.connect(dest);
        osc.start();

        audioElements[i].srcObject = dest.stream;
        audioElements[i].play().catch(function() {});

        audioContexts.push({ ctx: ctx, gain: gain, osc: osc, dest: dest, name: name });
        window.__vexaAudioStreams.push(dest.stream);
      });

      updateStatusAudio();
    }

    // ========== SPEAKER SWITCHING ==========
    function switchActiveSpeaker(index) {
      if (index < 0 || index >= PARTICIPANTS.length) return;
      currentActiveSpeakerIndex = index;
      var name = PARTICIPANTS[index];

      // Update active speaker frame
      document.getElementById('active-speaker-name').textContent = name;
      document.getElementById('active-avatar-circle').textContent = name[0];

      // Update speaker bar highlights
      var thumbs = document.querySelectorAll('.speaker-bar-container__video-frame');
      thumbs.forEach(function(el, i) {
        el.classList.toggle('speaking', i === index);
      });

      // Update status
      document.getElementById('status-speaker').textContent = 'Active: ' + name;
    }

    function switchActiveSpeakerByName(name) {
      var idx = PARTICIPANTS.indexOf(name);
      if (idx >= 0) switchActiveSpeaker(idx);
    }

    function startAutoCycle() {
      // Start with Alice
      switchActiveSpeaker(0);

      autoCycleTimer = setInterval(function() {
        currentActiveSpeakerIndex = (currentActiveSpeakerIndex + 1) % PARTICIPANTS.length;
        switchActiveSpeaker(currentActiveSpeakerIndex);
      }, 8000);
    }

    // ========== STATUS ==========
    function updateStatusAudio() {
      var activeCount = audioContexts.filter(function(c) { return c.gain.gain.value > 0.005; }).length;
      document.getElementById('status-audio').textContent = 'Audio: ' + activeCount + ' streams active';
    }

    // ========== PUBLIC JS API ==========

    // Manually set active speaker by name
    window.__zoomMockSwitchSpeaker = function(name) {
      switchActiveSpeakerByName(name);
    };

    // Get current mock state
    window.__zoomMockGetState = function() {
      return {
        speakers: PARTICIPANTS.slice(),
        activeSpeaker: PARTICIPANTS[currentActiveSpeakerIndex],
        activeSpeakerIndex: currentActiveSpeakerIndex,
        audioElements: audioElements ? Array.from(audioElements).map(function(el, i) {
          return {
            id: el.id,
            paused: el.paused,
            readyState: el.readyState,
            hasSrcObject: !!el.srcObject,
            trackCount: el.srcObject ? el.srcObject.getAudioTracks().length : 0,
            gain: audioContexts[i] ? audioContexts[i].gain.gain.value : null
          };
        }) : [],
        autoCycleActive: !!autoCycleTimer
      };
    };

    // Control individual speaker audio gain (for testing silence/speaking)
    window.__zoomMockSetGain = function(index, value) {
      if (audioContexts[index]) {
        audioContexts[index].gain.gain.value = value;
        updateStatusAudio();
      }
    };

    // Mute all, unmute one (simulate single active speaker audio)
    window.__zoomMockSetSpeaker = function(index) {
      audioContexts.forEach(function(c, i) {
        c.gain.gain.value = (i === index) ? 0.5 : 0;
      });
      switchActiveSpeaker(index);
      updateStatusAudio();
    };

    // Set all silent
    window.__zoomMockSetSilence = function() {
      audioContexts.forEach(function(c) { c.gain.gain.value = 0; });
      updateStatusAudio();
    };

    // Stop/start auto-cycle
    window.__zoomMockStopCycle = function() {
      if (autoCycleTimer) { clearInterval(autoCycleTimer); autoCycleTimer = null; }
      document.getElementById('status-cycle').textContent = 'Auto-cycle: OFF';
    };

    window.__zoomMockStartCycle = function() {
      if (autoCycleTimer) clearInterval(autoCycleTimer);
      autoCycleTimer = setInterval(function() {
        currentActiveSpeakerIndex = (currentActiveSpeakerIndex + 1) % PARTICIPANTS.length;
        switchActiveSpeaker(currentActiveSpeakerIndex);
      }, 8000);
      document.getElementById('status-cycle').textContent = 'Auto-cycle: ON (8s)';
    };
  </script>
</body>
</html>
