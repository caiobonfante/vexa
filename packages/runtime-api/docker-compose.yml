name: runtime-api

services:
  runtime-api:
    build: .
    ports:
      - "${PORT:-8090}:8090"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ORCHESTRATOR_BACKEND=${ORCHESTRATOR_BACKEND:-docker}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_NETWORK=runtime-api_default
      - PROFILES_PATH=/app/profiles.yaml
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - API_KEYS=${API_KEYS:-}
      - ALLOW_PRIVATE_CALLBACKS=${ALLOW_PRIVATE_CALLBACKS:-}
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
