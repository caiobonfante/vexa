[project]
name = "agent-runtime"
version = "0.1.0"
requires-python = ">=3.11"
description = "Generic AI agent runtime — chat streaming, workspace sync, scheduling"
license = {text = "Apache-2.0"}
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "redis>=5.0",
    "pydantic>=2.0",
    "aiodocker>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
