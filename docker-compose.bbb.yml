# BBB full stack override — adds billing, TX gateway, dashboard, webapp
# Usage: docker compose -f docker-compose.yml -f docker-compose.local-db.yml -f docker-compose.bbb.yml up -d --build

services:
  dashboard:
    build:
      context: /home/dima/dev/Vexa-Dashboard
    ports:
      - "${DASHBOARD_HOST_PORT:-3003}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - NEXT_PUBLIC_APP_URL=https://app.dev.vexa.ai
      - COOKIE_DOMAIN=.dev.vexa.ai
      - NEXT_PUBLIC_VEXA_WS_URL=wss://gateway.dev.vexa.ai/ws
      - NODE_ENV=production
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  webapp:
    build:
      context: /home/dima/dev/vexa-webapp-billing
      dockerfile: ./apps/webapp/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_VEXA_WS_URL=wss://gateway.dev.vexa.ai/ws
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - ADMIN_API_URL=http://admin-api:8001
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-vexa-dev-nextauth-secret}
      - NEXTAUTH_URL=https://app.dev.vexa.ai
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - PORTAL_RETURN_URL=https://app.dev.vexa.ai/account
      - NEXT_PUBLIC_DASHBOARD_URL=https://dashboard.dev.vexa.ai
      - MOCK_AUTH=true
      - NEXT_PUBLIC_MOCK_AUTH=true
      - COOKIE_DOMAIN=.dev.vexa.ai
    depends_on:
      admin-api:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  # billing service DELETED — Stripe is the source of truth (see billing-redesign.md)
  # billing service DELETED — Stripe is the source of truth
  # All billing logic lives in webapp (webhook handler) and transcription-gateway (stripe_accumulator)

  transcription-gateway:
    build:
      context: /home/dima/dev/vexa-transcription-gateway
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - TRANSCRIPTION_SERVICE_URL=http://host.docker.internal:8083
      - TRANSCRIPTION_SERVICE_API_TOKEN=${TRANSCRIPTION_SERVICE_API_TOKEN:-911bb6ba49922b15f97620ed9cfce53a}
      - REMOTE_TRANSCRIBER_API_KEY=${REMOTE_TRANSCRIBER_API_KEY:-}
      - HEALTH_CHECK_TIMEOUT=5
      - HEALTH_CHECK_INTERVAL=30
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - LOG_LEVEL=DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa_default
    restart: unless-stopped
