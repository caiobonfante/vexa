# Staging values for Vexa on Akamai/Linode LKE (vexa-lke, us-sea)
# Usage: helm install vexa ./helm/charts/vexa -f ./helm/charts/vexa/values-staging.yaml

global:
  imagePullPolicy: Always
  imagePullSecrets: []
    # - name: ghcr-secret  # TODO: set up container registry credentials

# ---------- Secrets ----------
# Override via --set or external secret manager
secrets:
  existingSecretName: ""
  adminApiToken: ""       # REQUIRED: set via --set secrets.adminApiToken=...
  transcriberApiKey: ""   # Must match BBB transcription-service API_TOKEN

# ---------- Database ----------
# Bundled Postgres for staging (switch to managed DB for prod)
database:
  host: ""  # auto-filled from postgres.enabled=true
  port: 5432
  name: "vexa"
  user: "vexa"
  sslMode: "disable"

postgres:
  enabled: true
  image: postgres:17-alpine
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi

# ---------- Redis ----------
redis:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi

# ---------- API Gateway ----------
apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/api-gateway
    tag: staging
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ---------- Admin API ----------
adminApi:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/admin-api
    tag: staging

# ---------- Bot Manager ----------
botManager:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/bot-manager
    tag: staging

  # Kubernetes orchestrator: bots spawn as separate Pods
  orchestrator: kubernetes
  kubernetesOrchestrator:
    createRbac: true
    botNamespace: ""  # same namespace as bot-manager

  bot:
    imageName: "ghcr.io/vexa-ai/vexa-bot:staging"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

  # Additional env vars passed to bot-manager deployment
  # Note: extraEnv in default values.yaml is a map; templates should handle both
  transcriptionServiceUrl: "http://vexa-transcription-gateway:8084/v1/audio/transcriptions"
  transcriptionServiceToken: "vxa_tx_YD5DxB4xHWdpBx0pDPL0XMAdLnt48lFjQ3Aj9r14"
  postMeetingHooks: "https://app.staging.vexa.ai/api/hooks/meeting-completed"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# ---------- Transcription Collector ----------
transcriptionCollector:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/transcription-collector
    tag: staging
  config:
    redisStreamName: "transcription_segments"
    redisSpeakerEventsStreamName: "speaker_events_relative"
    redisConsumerGroup: "transcription_collectors"
    backgroundTaskIntervalSeconds: 10
    immutabilityThresholdSeconds: 30
    redisSegmentTtlSeconds: 3600
    redisSpeakerEventTtlSeconds: 86400

# ---------- Transcription Service ----------
# Disabled — runs on BBB with GPU. Bot-manager points to BBB IP directly.
transcriptionService:
  enabled: false

# ---------- MCP ----------
mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/mcp
    tag: staging

# ---------- Dashboard ----------
dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/vexa-ai/dashboard
    tag: staging
  env:
    VEXA_PUBLIC_API_URL: "https://gateway.staging.vexa.ai"
    NEXT_PUBLIC_VEXA_WS_URL: "wss://gateway.staging.vexa.ai/ws"
    NEXT_PUBLIC_APP_URL: "https://dashboard.staging.vexa.ai"
    NEXT_PUBLIC_HOSTED_MODE: "false"
    COOKIE_DOMAIN: ".staging.vexa.ai"
  ingress:
    enabled: true
    className: "nginx"
    host: "dashboard.staging.vexa.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    tls:
      - secretName: dashboard-staging-tls
        hosts:
          - "dashboard.staging.vexa.ai"

# ---------- Migrations ----------
migrations:
  enabled: true
  image:
    repository: ghcr.io/vexa-ai/transcription-collector
    tag: staging

# ---------- Ingress (API Gateway) ----------
ingress:
  enabled: true
  className: "nginx"
  host: "gateway.staging.vexa.ai"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
  tls:
    - secretName: gateway-staging-tls
      hosts:
        - "gateway.staging.vexa.ai"
  paths:
    - path: /
      pathType: Prefix
      service: api-gateway
      servicePort: 8000
