version: "3.8"

services:
  agent-api:
    build:
      context: ../..
      dockerfile: services/agent-api/Dockerfile
    ports:
      - "8100:8100"
    environment:
      AGENT_RUNTIME_PORT: "8100"
      REDIS_URL: redis://redis:6379
      RUNTIME_API_URL: http://runtime-api:8090
      STORAGE_BACKEND: local
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  runtime-api:
    build:
      context: ../..
      dockerfile: services/runtime-api/Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
