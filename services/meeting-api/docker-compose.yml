name: meeting-api

services:
  meeting-api:
    build:
      context: ../..
      dockerfile: packages/meeting-api/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RUNTIME_API_URL=http://runtime-api:8090
      - MEETING_API_URL=http://meeting-api:8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=meeting
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_SSL_MODE=disable
      - API_KEYS=test-key
      - LOG_LEVEL=DEBUG
      - REDIS_STREAM_NAME=transcription_segments
      - REDIS_CONSUMER_GROUP=collector_group
      - BACKGROUND_TASK_INTERVAL=10
      - IMMUTABILITY_THRESHOLD=30
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      runtime-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  runtime-api:
    build:
      context: ../runtime-api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ORCHESTRATOR_BACKEND=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_NETWORK=meeting-api_default
      - LOG_LEVEL=DEBUG
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=meeting
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
